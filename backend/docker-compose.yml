version: '3.8'

services:
  # Planetary Agents Backend Service
  planetary-backend:
    build: .
    ports:
      - '8000:8000'
      - '8001:8001' # WebSocket port
    environment:
      - NODE_ENV=production
      - PORT=8000
      - WEBSOCKET_PORT=8001
      - REDIS_URL=redis://redis:6379
      - ALCHM_BACKEND_URL=https://alchm-backend.onrender.com
      - PLANETARY_HOURS_BACKEND=true
      - THERMODYNAMICS_BACKEND=true
      - TOKEN_CALCULATIONS_BACKEND=true
      - KINETICS_BACKEND=true
      - CORS_ORIGIN=http://localhost:3000
    depends_on:
      - redis
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "require('http').get('http://localhost:8000/api/health', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Redis Cache Service
  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 3

  # Redis Commander (Development only)
  redis-commander:
    image: rediscommander/redis-commander:latest
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - '8081:8081'
    depends_on:
      - redis
    profiles:
      - dev
    restart: unless-stopped

volumes:
  redis_data:
    driver: local

networks:
  default:
    name: planetary-agents-network
