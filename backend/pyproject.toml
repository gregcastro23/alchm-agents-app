[tool.ruff]
target-version = "py311"

[tool.ruff.lint]
# Enable select rules (E: pycodestyle, F: Pyflakes)
select = ["E", "F"]

# Ignore specific rules
# E701: multiple statements on one line (colon) -> sometimes useful for short guard clauses
# E402: module level import not at top of file -> needed for circular dependency workarounds in local files
# E501: line too long -> prompts and strings should be allowed to be long
ignore = ["E701", "E402", "E501"]
