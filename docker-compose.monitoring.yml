# Planetary Agents - Monitoring Stack
# Optional monitoring services for production deployment

version: '3.8'

services:
  # ==============================================
  # Prometheus (Metrics Collection)
  # ==============================================
  prometheus:
    image: prom/prometheus:latest
    container_name: planetary-prometheus
    ports:
      - '9090:9090'
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    restart: unless-stopped
    profiles:
      - monitoring
    networks:
      - planetary-monitoring

  # ==============================================
  # Grafana (Metrics Visualization)
  # ==============================================
  grafana:
    image: grafana/grafana:latest
    container_name: planetary-grafana
    ports:
      - '3001:3000'
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=consciousness
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SECURITY_DISABLE_GRAVATAR=true
      - GF_ANALYTICS_REPORTING_ENABLED=false
    restart: unless-stopped
    profiles:
      - monitoring
    networks:
      - planetary-monitoring

  # ==============================================
  # Node Exporter (System Metrics)
  # ==============================================
  node-exporter:
    image: prom/node-exporter:latest
    container_name: planetary-node-exporter
    ports:
      - '9100:9100'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    restart: unless-stopped
    profiles:
      - monitoring
    networks:
      - planetary-monitoring

  # ==============================================
  # cAdvisor (Container Metrics)
  # ==============================================
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: planetary-cadvisor
    ports:
      - '8080:8080'
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    privileged: true
    devices:
      - /dev/kmsg
    restart: unless-stopped
    profiles:
      - monitoring
    networks:
      - planetary-monitoring

  # ==============================================
  # Loki (Log Aggregation)
  # ==============================================
  loki:
    image: grafana/loki:latest
    container_name: planetary-loki
    ports:
      - '3100:3100'
    volumes:
      - ./monitoring/loki.yml:/etc/loki/local-config.yaml
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped
    profiles:
      - monitoring
    networks:
      - planetary-monitoring

  # ==============================================
  # Promtail (Log Shipper)
  # ==============================================
  promtail:
    image: grafana/promtail:latest
    container_name: planetary-promtail
    volumes:
      - ./monitoring/promtail.yml:/etc/promtail/config.yml
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yml
    restart: unless-stopped
    profiles:
      - monitoring
    networks:
      - planetary-monitoring

  # ==============================================
  # AlertManager (Alert Management)
  # ==============================================
  alertmanager:
    image: prom/alertmanager:latest
    container_name: planetary-alertmanager
    ports:
      - '9093:9093'
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml
      - alertmanager_data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    restart: unless-stopped
    profiles:
      - monitoring
    networks:
      - planetary-monitoring

# ==============================================
# Monitoring Volumes
# ==============================================
volumes:
  prometheus_data:
    driver: local
    name: planetary_prometheus_data
  grafana_data:
    driver: local
    name: planetary_grafana_data
  loki_data:
    driver: local
    name: planetary_loki_data
  alertmanager_data:
    driver: local
    name: planetary_alertmanager_data

# ==============================================
# Monitoring Networks
# ==============================================
networks:
  planetary-monitoring:
    name: planetary-monitoring-network
    driver: bridge
