# =============================================================================
# PLANETARY AGENTS BACKEND - RENDER DEPLOYMENT CONFIGURATION
# =============================================================================

services:
  # Main backend service
  - type: web
    name: planetary-agents-backend
    runtime: node
    plan: starter  # Change to 'standard' or 'pro' for production
    region: oregon  # or 'frankfurt' for EU

    # Build configuration
    buildCommand: corepack enable && corepack prepare yarn@4.0.0 --activate && yarn install && yarn build
    startCommand: yarn start

    # Environment configuration
    envVars:
      - key: NODE_ENV
        value: production

      - key: LOG_LEVEL
        value: info

      - key: LOG_FORMAT
        value: json

      - key: ENABLE_KINETICS_BACKEND
        value: true

      - key: ENABLE_CONSCIOUSNESS_BACKEND
        value: true

      - key: ENABLE_PLANETARY_BACKEND
        value: true

      - key: ENABLE_TOKEN_BACKEND
        value: true

      - key: ENABLE_WEBSOCKET
        value: true

      - key: ENABLE_PERFORMANCE_MONITORING
        value: true

      - key: ENABLE_REQUEST_LOGGING
        value: true

      - key: ENABLE_ERROR_TRACKING
        value: true

      - key: ALCHM_BACKEND_URL
        value: https://alchm-backend.onrender.com

      - key: RATE_LIMIT_REQUESTS_PER_MINUTE
        value: 100

      - key: MAX_REQUEST_SIZE_MB
        value: 10

      - key: PLANETARY_CACHE_TTL
        value: 120

      - key: CONSCIOUSNESS_CACHE_TTL
        value: 300

      - key: KINETICS_CACHE_TTL
        value: 120

      - key: TOKEN_CACHE_TTL
        value: 60

      # CORS origins - UPDATE THIS with your actual frontend domain
      - key: CORS_ORIGINS
        value: http://localhost:3000,https://planetary-agents.vercel.app

    # Health check configuration
    healthCheckPath: /api/health

    # Auto-deploy configuration
    autoDeploy: true

    # Resource limits
    # disk: 1GB  # Uncomment if you need persistent storage

    # Scaling configuration (for paid plans)
    # numInstances: 1
    # minInstances: 1
    # maxInstances: 3

# Optional Redis service for enhanced caching
# Uncomment to add Redis caching (requires paid plan)
# - type: redis
#   name: planetary-agents-redis
#   plan: starter
#   region: oregon
#
#   # This will automatically provide REDIS_URL environment variable
#   # to the web service above

# =============================================================================
# DEPLOYMENT INSTRUCTIONS
# =============================================================================

# 1. Push your code to GitHub/GitLab
# 2. Connect your repository in Render dashboard
# 3. Use this render.yaml for automatic configuration
# 4. Update CORS_ORIGINS environment variable with your frontend domain
# 5. Optionally add Redis service for better caching
# 6. Monitor deployment through Render dashboard

# =============================================================================
# ENVIRONMENT VARIABLES TO SET MANUALLY IN RENDER DASHBOARD
# =============================================================================

# These should be set through the Render dashboard for security:
#
# REDIS_URL (if using Redis service):
# - Automatically provided if you add Redis service above
# - Or manually set if using external Redis provider
#
# CORS_ORIGINS:
# - Update with your actual frontend domain(s)
# - Example: https://planetary-agents.vercel.app,https://www.yourdomain.com
#
# Custom domains:
# - Set up custom domain in Render dashboard after deployment
# - Update DNS records to point to Render

# =============================================================================
# POST-DEPLOYMENT CHECKLIST
# =============================================================================

# ✅ Verify health check endpoint: https://your-service.onrender.com/api/health
# ✅ Test API endpoints with your frontend
# ✅ Check logs for any errors or warnings
# ✅ Verify caching is working (Redis or memory fallback)
# ✅ Test WebSocket connections if enabled
# ✅ Update frontend environment variables to point to Render URL
# ✅ Set up monitoring and alerting if needed
# ✅ Configure custom domain if required

# =============================================================================
# SCALING AND PERFORMANCE NOTES
# =============================================================================

# Starter Plan Limits:
# - 512 MB RAM
# - 0.1 CPU
# - Good for development and testing
#
# Standard Plan (recommended for production):
# - 2 GB RAM
# - 1 CPU
# - Better performance and uptime
#
# Pro Plan (for high traffic):
# - 4 GB RAM
# - 2 CPU
# - Auto-scaling capabilities
#
# Redis recommended for:
# - Multiple service instances
# - Better cache performance
# - Shared cache across instances