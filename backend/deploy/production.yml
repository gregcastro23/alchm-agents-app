# Production Deployment Configuration
# ==================================

version: '3.8'

services:
  # Planetary Agents Backend Service
  planetary-backend:
    image: planetary-agents-backend:latest
    ports:
      - "8000:8000"
      - "8001:8001"
    environment:
      - NODE_ENV=production
      - PORT=8000
      - WEBSOCKET_PORT=8001
      - REDIS_URL=${REDIS_URL}
      - DATABASE_URL=${DATABASE_URL}
      - ALCHM_BACKEND_URL=https://alchm-backend.onrender.com
      - PLANETARY_HOURS_BACKEND=true
      - THERMODYNAMICS_BACKEND=true
      - TOKEN_CALCULATIONS_BACKEND=true
      - KINETICS_BACKEND=true
      - CORS_ORIGIN=${FRONTEND_URL}
      - LOG_LEVEL=info
      - LOG_FORMAT=json
    depends_on:
      - redis
      - postgres
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    deploy:
      replicas: 3
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Redis Cache Service
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 1gb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=planetary_agents
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'

  # Nginx Load Balancer
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - planetary-backend
    restart: unless-stopped

volumes:
  redis_data:
    driver: local
  postgres_data:
    driver: local

networks:
  default:
    name: planetary-agents-production
